name: AgStack Asset Registry API
description: Shared capability definitions for the AgStack Asset Registry providing field boundary registration and retrieval with unique geo IDs.
version: "1.0.0"
source: https://api-ar.agstack.org
operations:
  - operationId: login
    summary: Login
    method: POST
    path: /login
    description: Authenticate with email and password to receive access and refresh tokens
    request:
      type: object
      properties:
        email: string
        password: string
    response:
      type: object
      properties:
        access_token: string
        refresh_token: string

  - operationId: registerFieldBoundary
    summary: Register Field Boundary
    method: POST
    path: /register-field-boundary
    description: Register a field boundary using WKT geometry and receive a unique 16-character geo ID
    request:
      type: object
    response:
      type: object

  - operationId: registerFieldBoundariesGeoJson
    summary: Register Field Boundaries GeoJSON
    method: POST
    path: /register-field-boundaries-geojson
    description: Bulk register multiple field boundaries from a GeoJSON file
    request:
      type: object
    response:
      type: object

  - operationId: registerPoint
    summary: Register Point
    method: POST
    path: /register-point
    description: Register a geographic point and receive a unique geo ID
    request:
      type: object
    response:
      type: object

  - operationId: fetchField
    summary: Fetch Field Data
    method: GET
    path: /fetch-field/{geo_id}
    description: Retrieve full field boundary data for a registered geo ID
    parameters:
      - name: geo_id
        in: path
        required: true
        type: string
    response:
      type: object

  - operationId: fetchFieldWkt
    summary: Fetch Field WKT
    method: GET
    path: /fetch-field-wkt/{geo_id}
    description: Retrieve the WKT geometry for a registered field
    parameters:
      - name: geo_id
        in: path
        required: true
        type: string
    response:
      type: string

  - operationId: fetchFieldCentroid
    summary: Fetch Field Centroid
    method: GET
    path: /fetch-field-centroid/{geo_id}
    description: Retrieve the centroid point of a registered field
    parameters:
      - name: geo_id
        in: path
        required: true
        type: string
    response:
      type: object

  - operationId: getPercentageOverlap
    summary: Get Percentage Overlap
    method: POST
    path: /get-percentage-overlap-two-fields
    description: Calculate the percentage spatial overlap between two registered fields
    request:
      type: object
    response:
      type: object
